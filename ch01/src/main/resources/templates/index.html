<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>1장_SpringAI_개요</title>
    <style>
        body {
            width: 800px;
            margin: 20px auto;
        }

        #chat-panel {
            height: 500px;
            border: 1px solid #ccc;
            padding: 10px;
            overflow-y: auto;
            margin-bottom: 10px;
        }

        textarea {
            width: 100%;
            height: 80px;
            box-sizing: border-box
        }

        button {
            margin-top: 10px;
            padding: 10px;
        }
    </style>

    <script>
        async function submit(){
            const chatPanel = document.getElementById('chat-panel');
            const question = document.getElementById('question');

            const userQuestion = question.value.trim();
            if (!userQuestion) return; // 빈 입력 차단

            // [개선] 질문을 누르자마자 챗 패널에 내가 쓴 질문을 먼저 추가 (반응성 확보)
            chatPanel.innerHTML += `<div><strong>나:</strong> ${userQuestion}</div>`;
            question.value = ''; // 입력창 비우기
            chatPanel.scrollTop = chatPanel.scrollHeight; // 스크롤을 맨 아래로

            try {
                const response = await fetch('/ai/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                        'Accept': 'text/plain'
                    },
                    body: new URLSearchParams({
                        question: userQuestion // 변수명 매칭
                    })
                });

                const data = await response.text();

                // [개선] 덮어쓰지 않고 기존 내용 아래에 AI 답변 추가
                chatPanel.innerHTML += `<div style="margin-top: 5px; margin-bottom: 15px;"><strong>AI:</strong> ${data}</div>`;
                chatPanel.scrollTop = chatPanel.scrollHeight;

            } catch (error) {
                console.error(error);
                chatPanel.innerHTML += `<div style="color: red;">오류가 발생했습니다.</div>`;
            }
        }
    </script>
</head>
<body>
<h3>1장_SpringAI_개요</h3>

<div id="chat-panel"></div>
<textarea id="question" placeholder="질문을 입력하세요."></textarea>
<button onclick="submit()">질문하기</button>
</body>
</html>
